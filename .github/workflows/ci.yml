name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # action-setup reads the packageManager field in package.json (pnpm@10.x).
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm docs:build

  # Visual regression — DESIGN-LANGUAGE.md's "visual regression runs in both
  # modes" promise, enforced. Every docs page screenshotted light+dark at
  # phone+desktop; pixel drift here IS design drift. Baselines are committed
  # (generated on linux, same as this runner).
  visual:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Build docs
        run: pnpm docs:build

      - name: Visual regression
        run: npx playwright test

      - name: Upload diff report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
