name: Deploy Docs

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one in-flight Pages deploy at a time; don't cancel a running deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # action-setup reads the packageManager field in package.json (pnpm@10.x).
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      # BASE_PATH assumes the repo is named 'make' served from a user/org
      # Pages domain (e.g. https://<user>.github.io/make/). If your repo has a
      # different name, or you use a custom/apex domain, edit this one line.
      - name: Build docs
        run: pnpm docs:build
        env:
          SITE_URL: ${{ steps.pages.outputs.origin }}
          BASE_PATH: /make/  # trailing slash matters: BASE_URL is used as a join prefix

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
